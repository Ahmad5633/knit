<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <defs>
    <linearGradient id="mtSky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#c9e6e2"/>
      <stop offset="1" stop-color="#f1e3c8"/>
    </linearGradient>
    <linearGradient id="mtPeak" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#5e8a6a"/>
      <stop offset="1" stop-color="#2e5a40"/>
    </linearGradient>
    <linearGradient id="mtWater" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#7aa8b0"/>
      <stop offset="1" stop-color="#3e6878"/>
    </linearGradient>
    <clipPath id="mtRound">
      <rect width="80" height="80" rx="22"/>
    </clipPath>
  </defs>
  <g clip-path="url(#mtRound)">
    <rect width="80" height="80" fill="url(#mtSky)"/>
    <!-- Clouds -->
    <ellipse cx="20" cy="18" rx="10" ry="3" fill="#ffffff" opacity="0.85"/>
    <ellipse cx="58" cy="14" rx="8" ry="2.5" fill="#ffffff" opacity="0.8"/>
    <!-- Mountain peak -->
    <path d="M8 56 L 28 22 L 40 38 L 52 18 L 72 56 Z"
          fill="url(#mtPeak)"/>
    <!-- Snow on peak -->
    <path d="M48 22 L 52 18 L 56 22 L 54 28 L 50 30 L 46 26 Z" fill="#f4f4e8"/>
    <path d="M25 26 L 28 22 L 30 26 L 27 30 Z" fill="#f4f4e8" opacity="0.9"/>
    <!-- Mid hill -->
    <path d="M0 60 L 16 50 L 30 58 L 44 52 L 60 58 L 80 54 L 80 64 L 0 66 Z"
          fill="#3a6a4a"/>
    <!-- Water -->
    <rect y="62" width="80" height="14" fill="url(#mtWater)"/>
    <!-- Reflection -->
    <path d="M28 62 L 40 70 L 52 62 Z" fill="#3a6a4a" opacity="0.4"/>
    <!-- Water ripples -->
    <path d="M6 68 L 22 67 L 38 68 L 56 67 L 74 68" stroke="rgba(255,255,255,0.4)" stroke-width="0.6" fill="none"/>
    <path d="M10 72 L 30 71 L 50 72 L 68 71" stroke="rgba(255,255,255,0.3)" stroke-width="0.5" fill="none"/>
  </g>
</svg>
