<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 80" width="64" height="80">
  <defs>
    <linearGradient id="mvRight" x1="0.2" x2="0.9" y1="0" y2="1">
      <stop offset="0" stop-color="#bfe3f0" stop-opacity="0.85"/>
      <stop offset="0.45" stop-color="#5aa3c8"/>
      <stop offset="0.85" stop-color="#3a6a92"/>
      <stop offset="1" stop-color="#2a4a72"/>
    </linearGradient>
    <linearGradient id="mvLeft" x1="0.9" x2="0.1" y1="0" y2="1">
      <stop offset="0" stop-color="#e8c8d4"/>
      <stop offset="0.4" stop-color="#a878a0"/>
      <stop offset="0.8" stop-color="#5a4878"/>
      <stop offset="1" stop-color="#3a2a58"/>
    </linearGradient>
  </defs>

  <!-- Right vane (blue/teal) -->
  <path d="M34 6
           Q 52 16 50 36
           Q 48 52 40 66
           Q 36 72 32 76
           L 32 12
           Z"
        fill="url(#mvRight)"/>

  <!-- Left vane (pink/purple) -->
  <path d="M32 12
           L 32 76
           Q 28 72 24 66
           Q 16 52 14 36
           Q 12 18 28 8
           Q 30 6 32 12 Z"
        fill="url(#mvLeft)"/>

  <!-- Light barbs right -->
  <g stroke="rgba(255,255,255,0.45)" stroke-width="0.4" fill="none" stroke-linecap="round">
    <path d="M32 16 Q 42 18 46 22"/>
    <path d="M32 22 Q 44 24 48 28"/>
    <path d="M32 28 Q 44 30 48 34"/>
    <path d="M32 34 Q 44 36 48 40"/>
    <path d="M32 40 Q 42 42 46 46"/>
    <path d="M32 46 Q 40 48 44 52"/>
    <path d="M32 52 Q 38 54 42 58"/>
    <path d="M32 58 Q 36 60 39 64"/>
  </g>
  <!-- Light barbs left -->
  <g stroke="rgba(255,255,255,0.35)" stroke-width="0.4" fill="none" stroke-linecap="round">
    <path d="M32 16 Q 22 18 18 22"/>
    <path d="M32 22 Q 20 24 16 28"/>
    <path d="M32 28 Q 20 30 16 34"/>
    <path d="M32 34 Q 20 36 16 40"/>
    <path d="M32 40 Q 22 42 18 46"/>
    <path d="M32 46 Q 24 48 20 52"/>
    <path d="M32 52 Q 26 54 22 58"/>
    <path d="M32 58 Q 28 60 25 64"/>
  </g>

  <!-- Highlight stripe -->
  <path d="M32 12 L 32 76" stroke="rgba(255,255,255,0.3)" stroke-width="1.2" fill="none" stroke-linecap="round"/>

  <!-- Rachis -->
  <path d="M32 8 L 32 78" stroke="rgba(30,20,40,0.6)" stroke-width="0.9" stroke-linecap="round" fill="none"/>

  <!-- Tip wisps -->
  <g stroke="#5a7a92" stroke-opacity="0.85" stroke-width="0.9" stroke-linecap="round" fill="none">
    <path d="M30 74 Q 26 78 22 78"/>
    <path d="M32 76 Q 32 80 30 80"/>
    <path d="M34 74 Q 38 78 42 78"/>
    <path d="M30 70 Q 27 74 24 75"/>
    <path d="M34 70 Q 37 74 40 75"/>
  </g>
