<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <defs>
    <linearGradient id="blSky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#fde2c8"/>
      <stop offset="0.45" stop-color="#dcc4d0"/>
      <stop offset="1" stop-color="#8b8ab0"/>
    </linearGradient>
    <linearGradient id="blPeak" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#5e6a90"/>
      <stop offset="1" stop-color="#2e3658"/>
    </linearGradient>
    <linearGradient id="blFront" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#3a4068"/>
      <stop offset="1" stop-color="#1a1e3a"/>
    </linearGradient>
    <clipPath id="blRound">
      <rect width="80" height="80" rx="22"/>
    </clipPath>
  </defs>
  <g clip-path="url(#blRound)">
    <rect width="80" height="80" fill="url(#blSky)"/>
    <!-- Distant haze ridge -->
    <path d="M0 50 C 20 46, 40 50, 60 48 C 70 47, 78 50, 80 50 L 80 80 L 0 80 Z"
          fill="#a9aac4" opacity="0.55"/>
    <!-- Snow-capped main peak -->
    <path d="M14 60 L 32 32 L 40 42 L 50 24 L 66 60 Z"
          fill="url(#blPeak)"/>
    <!-- Snow on peak -->
    <path d="M48 26 L 50 24 L 52 26 L 54 32 L 50 34 L 46 32 Z"
          fill="#ffffff"/>
    <path d="M30 34 L 32 32 L 34 34 L 32 38 Z"
          fill="#ffffff" opacity="0.9"/>
    <!-- Side ridge -->
    <path d="M0 64 L 10 54 L 18 60 L 26 56 L 30 64 L 0 70 Z"
          fill="#525a7a"/>
    <!-- Front foreground -->
    <path d="M0 68 C 20 62, 40 68, 60 66 C 70 65, 76 68, 80 66 L 80 80 L 0 80 Z"
          fill="url(#blFront)"/>
  </g>
</svg>
