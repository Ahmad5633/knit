<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 80" width="64" height="80">
  <defs>
    <linearGradient id="vaneR" x1="0.2" x2="0.9" y1="0" y2="1">
      <stop offset="0" stop-color="currentColor" stop-opacity="0.3"/>
      <stop offset="0.35" stop-color="currentColor" stop-opacity="0.95"/>
      <stop offset="1" stop-color="currentColor" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="vaneL" x1="0.9" x2="0.1" y1="0" y2="1">
      <stop offset="0" stop-color="currentColor" stop-opacity="1"/>
      <stop offset="0.5" stop-color="currentColor" stop-opacity="0.75"/>
      <stop offset="1" stop-color="currentColor" stop-opacity="0.4"/>
    </linearGradient>
  </defs>

  <!-- Right vane -->
  <path d="M34 6
           Q 52 16 50 36
           Q 48 52 40 66
           Q 36 72 32 76
           L 32 12
           Z"
        fill="url(#vaneR)"/>

  <!-- Left vane -->
  <path d="M32 12
           L 32 76
           Q 28 72 24 66
           Q 16 52 14 36
           Q 12 18 28 8
           Q 30 6 32 12 Z"
        fill="url(#vaneL)"/>

  <!-- Light barb texture -->
  <g stroke="rgba(255,255,255,0.4)" stroke-width="0.4" fill="none" stroke-linecap="round">
    <path d="M32 16 Q 42 18 46 22"/>
    <path d="M32 22 Q 44 24 48 28"/>
    <path d="M32 28 Q 44 30 48 34"/>
    <path d="M32 34 Q 44 36 48 40"/>
    <path d="M32 40 Q 42 42 46 46"/>
    <path d="M32 46 Q 40 48 44 52"/>
    <path d="M32 52 Q 38 54 42 58"/>
    <path d="M32 58 Q 36 60 39 64"/>
  </g>
  <g stroke="rgba(20,15,30,0.22)" stroke-width="0.4" fill="none" stroke-linecap="round">
    <path d="M32 16 Q 22 18 18 22"/>
    <path d="M32 22 Q 20 24 16 28"/>
    <path d="M32 28 Q 20 30 16 34"/>
    <path d="M32 34 Q 20 36 16 40"/>
    <path d="M32 40 Q 22 42 18 46"/>
    <path d="M32 46 Q 24 48 20 52"/>
    <path d="M32 52 Q 26 54 22 58"/>
    <path d="M32 58 Q 28 60 25 64"/>
  </g>

  <!-- Highlight stripe along rachis -->
  <path d="M32 12 L 32 76" stroke="rgba(255,255,255,0.25)" stroke-width="1.4" fill="none" stroke-linecap="round"/>

  <!-- Rachis (central shaft) -->
  <path d="M32 8 L 32 78" stroke="rgba(30,20,30,0.65)" stroke-width="0.9" stroke-linecap="round" fill="none"/>

  <!-- Tip wisps -->
  <g stroke="currentColor" stroke-opacity="0.85" stroke-width="0.9" stroke-linecap="round" fill="none">
    <path d="M30 74 Q 26 78 22 78"/>
    <path d="M32 76 Q 32 80 30 80"/>
    <path d="M34 74 Q 38 78 42 78"/>
    <path d="M30 70 Q 27 74 24 75"/>
    <path d="M34 70 Q 37 74 40 75"/>
  </g>
</svg>
