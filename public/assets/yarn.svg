<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <defs>
    <radialGradient id="ballShade" cx="0.32" cy="0.28" r="0.85">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="0.4" stop-color="currentColor"/>
      <stop offset="0.85" stop-color="currentColor" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.18"/>
    </radialGradient>
  </defs>

  <!-- Ball body -->
  <circle cx="40" cy="42" r="32" fill="url(#ballShade)"/>

  <!-- Cross-wound yarn strands (lighter) -->
  <g stroke="rgba(255,255,255,0.45)" stroke-width="1.2" fill="none" stroke-linecap="round">
    <path d="M14 30 Q 30 14 56 18"/>
    <path d="M10 38 Q 26 24 60 26"/>
    <path d="M10 48 Q 24 34 62 36"/>
    <path d="M12 56 Q 26 44 64 46"/>
    <path d="M16 64 Q 30 54 64 56"/>
    <path d="M22 70 Q 36 64 60 66"/>
  </g>

  <!-- Cross-wound strands (perpendicular angle) -->
  <g stroke="rgba(0,0,0,0.18)" stroke-width="1" fill="none" stroke-linecap="round">
    <path d="M22 14 Q 30 30 24 64"/>
    <path d="M34 12 Q 42 32 36 70"/>
    <path d="M46 12 Q 54 32 48 70"/>
    <path d="M58 16 Q 64 34 56 66"/>
  </g>

  <!-- Highlight -->
  <ellipse cx="30" cy="28" rx="10" ry="6" fill="rgba(255,255,255,0.35)"/>

  <!-- Loose yarn end -->
  <path d="M60 14
           Q 66 16 64 22
           Q 60 26 64 30
           Q 70 34 66 40"
        stroke="currentColor" stroke-width="2.4" fill="none" stroke-linecap="round"/>
  <path d="M60 14
           Q 66 16 64 22
           Q 60 26 64 30
           Q 70 34 66 40"
        stroke="rgba(0,0,0,0.2)" stroke-width="0.8" fill="none" stroke-linecap="round"/>
</svg>
