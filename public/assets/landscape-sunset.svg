<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <defs>
    <linearGradient id="ssSky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#fde29a"/>
      <stop offset="0.5" stop-color="#f5a35e"/>
      <stop offset="1" stop-color="#e8704a"/>
    </linearGradient>
    <linearGradient id="ssHill" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#c8484a"/>
      <stop offset="1" stop-color="#8c2a3a"/>
    </linearGradient>
    <radialGradient id="ssSun" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fff4d0"/>
      <stop offset="0.7" stop-color="#ffd270"/>
      <stop offset="1" stop-color="#ffa040" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="ssRound">
      <rect width="80" height="80" rx="22"/>
    </clipPath>
  </defs>
  <g clip-path="url(#ssRound)">
    <rect width="80" height="80" fill="url(#ssSky)"/>
    <!-- Sun glow -->
    <circle cx="40" cy="44" r="22" fill="url(#ssSun)" opacity="0.95"/>
    <circle cx="40" cy="44" r="10" fill="#fff2c8"/>
    <!-- Smooth hills back -->
    <path d="M0 56 C 20 50, 36 52, 50 50 C 64 48, 74 52, 80 50 L 80 80 L 0 80 Z"
          fill="#e07a52" opacity="0.85"/>
    <!-- Mid hills -->
    <path d="M0 64 C 18 56, 32 62, 48 58 C 62 56, 72 62, 80 60 L 80 80 L 0 80 Z"
          fill="url(#ssHill)"/>
    <!-- Front silhouette -->
    <path d="M0 72 C 20 66, 40 72, 60 68 C 70 66, 76 70, 80 70 L 80 80 L 0 80 Z"
          fill="#601a26"/>
  </g>
</svg>
