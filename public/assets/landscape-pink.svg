<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <defs>
    <linearGradient id="pkSky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#fde6e0"/>
      <stop offset="1" stop-color="#f4c7c8"/>
    </linearGradient>
    <linearGradient id="pkBack" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#e88aa0"/>
      <stop offset="1" stop-color="#d06a86"/>
    </linearGradient>
    <linearGradient id="pkFront" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#c44868"/>
      <stop offset="1" stop-color="#9c3050"/>
    </linearGradient>
    <clipPath id="pkRound">
      <rect width="80" height="80" rx="22"/>
    </clipPath>
  </defs>
  <g clip-path="url(#pkRound)">
    <rect width="80" height="80" fill="url(#pkSky)"/>
    <!-- Back range -->
    <path d="M0 50 L 12 30 L 22 42 L 32 26 L 44 40 L 54 28 L 66 38 L 80 30 L 80 80 L 0 80 Z"
          fill="url(#pkBack)"/>
    <!-- Snow caps back -->
    <path d="M30 28 L 32 26 L 34 28 L 33 30 Z" fill="#ffffff" opacity="0.85"/>
    <path d="M52 30 L 54 28 L 56 30 L 55 32 Z" fill="#ffffff" opacity="0.85"/>
    <!-- Front jagged range -->
    <path d="M0 64 L 10 48 L 20 60 L 30 44 L 42 58 L 52 46 L 64 60 L 80 50 L 80 80 L 0 80 Z"
          fill="url(#pkFront)"/>
    <!-- Snow caps front -->
    <path d="M28 46 L 30 44 L 33 47 L 32 50 L 30 49 Z" fill="#ffffff"/>
    <path d="M50 48 L 52 46 L 54 49 L 53 52 L 51 51 Z" fill="#ffffff"/>
    <!-- Foreground shadow -->
    <path d="M0 72 L 80 70 L 80 80 L 0 80 Z" fill="#5a1830" opacity="0.55"/>
  </g>
</svg>
